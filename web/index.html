<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Theta</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand" aria-label="Theta chess engine">
          theta
        </div>

        <nav class="mode-menu" aria-label="Mode">
          <button class="mode active" data-mode="play">Play</button>
          <button class="mode" data-mode="analysis">Analyze</button>
          <button class="mode" data-mode="editor">Board editor</button>
        </nav>

        <button class="flip" id="flip" aria-label="Flip board">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 11a8 8 0 0 0-14.9-4.1L3 9m0-5v5h5M4 13a8 8 0 0 0 14.9 4.1L21 15m0 5v-5h-5"/>
          </svg>
        </button>
      </header>

      <section class="workspace">
        <div class="evaluation" aria-label="Evaluation">
          <div id="eval-fill"></div>
          <span id="eval-label">+0.00</span>
        </div>

        <div class="board-wrap">
          <div class="board" id="board" aria-label="Chess board"></div>
        </div>

        <aside class="panel" id="side-panel">
          <div class="engine-state">
            <div class="engine-summary">
              <span id="search-status">Idle</span>
              <span id="depth">Depth 0</span>
              <span id="search-stats">Waiting for engine</span>
            </div>
            <button class="engine-settings" id="engine-settings" aria-label="Search settings" aria-expanded="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19.1 13.5c.1-.5.1-1 .1-1.5s0-1-.1-1.5l2.1-1.6-2-3.5-2.5 1a8.3 8.3 0 0 0-2.6-1.5L13.8 2h-4l-.4 2.7a8.3 8.3 0 0 0-2.6 1.5l-2.5-1-2 3.5 2.1 1.6c-.1.5-.1 1-.1 1.5s0 1 .1 1.5l-2.1 1.6 2 3.5 2.5-1a8.3 8.3 0 0 0 2.6 1.5l.4 2.7h4l.4-2.7a8.3 8.3 0 0 0 2.6-1.5l2.5 1 2-3.5-2.1-1.6ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/>
              </svg>
            </button>
          </div>

          <button class="analysis-toggle primary-action" id="analysis-toggle" hidden>
            Stop analysis
          </button>

          <div class="play-controls" id="play-controls">
            <span>Play as</span>
            <div class="side-selector" role="group" aria-label="Choose your side">
              <button class="play-color active" data-color="white" aria-pressed="true">White</button>
              <button class="play-color" data-color="black" aria-pressed="false">Black</button>
            </div>
          </div>

          <div class="search-settings" id="search-settings" hidden>
            <label>
              <span>Search time</span>
              <output id="search-time-value">1.0s</output>
              <input id="search-time" type="range" min="100" max="5000" step="100" value="1000">
            </label>
            <label>
              <span>Depth limit</span>
              <output id="search-depth-value">8</output>
              <input id="search-depth" type="range" min="1" max="20" step="1" value="8">
            </label>
            <label class="checkbox-setting">
              <span>Infinite analysis</span>
              <input id="search-infinite" type="checkbox">
            </label>
          </div>

          <div class="editor-tools" id="editor-tools" hidden>
            <div class="panel-heading">
              <div>
                <h2>Board editor</h2>
                <p>Choose a piece or eraser, then click the board.</p>
              </div>
            </div>

            <div class="piece-tray" id="piece-tray"></div>

            <div class="editor-setting">
              <span>Side to move</span>
              <div class="side-selector" id="editor-side" role="group" aria-label="Side to move">
                <button class="editor-color active" data-color="white" aria-pressed="true">White</button>
                <button class="editor-color" data-color="black" aria-pressed="false">Black</button>
              </div>
            </div>

            <details class="position-details">
              <summary>Castling rights</summary>
              <div class="castling-options">
                <label><input type="checkbox" data-castling="K"> White O-O</label>
                <label><input type="checkbox" data-castling="Q"> White O-O-O</label>
                <label><input type="checkbox" data-castling="k"> Black O-O</label>
                <label><input type="checkbox" data-castling="q"> Black O-O-O</label>
              </div>
            </details>

            <div class="editor-actions">
              <button id="starting-position">Starting position</button>
              <button id="clear">Clear board</button>
              <button class="primary-action" id="analyze-position">Analyze position</button>
            </div>
          </div>

          <ol class="lines" id="lines"></ol>

          <div class="move-history" id="move-history"></div>

          <div class="move-controls" id="move-controls">
            <button id="first-move" aria-label="First position">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 5v14M18 5l-8 7 8 7z"/>
              </svg>
            </button>
            <button id="previous-move" aria-label="Previous move">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m15 5-8 7 8 7z"/>
              </svg>
            </button>
            <button id="next-move" aria-label="Next move">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 5 8 7-8 7z"/>
              </svg>
            </button>
            <button id="last-move" aria-label="Last position">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 5v14M6 5l8 7-8 7z"/>
              </svg>
            </button>
          </div>

        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
