# This is the configuration file for Theta Chess Engine.
# You can adjust the settings below to customize the engine's behavior.
# Remove a (#) at the beginning of a line to enable a setting, or add one to disable it.

[options]
# Multi-threaded search is not implemented yet. Theta currently uses one
# search worker; a UCI Threads option will be added with Lazy SMP.
max_depth = 20
# threads = 4

[developer]
# When false, Theta strongly avoids choosing repetition, fifty-move,
# insufficient-material, and stalemate lines when an alternative exists.
allow_draw = true
