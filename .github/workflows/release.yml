name: Build and release Theta

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Pull-request builds should never receive a write-capable token.
permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up MinGW g++
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
          path-type: inherit

      - name: Build release and run tests
        shell: cmd
        env:
          THETA_ENGINE_LINK_FLAGS: -static -static-libgcc -static-libstdc++
        run: build.cmd release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: theta-windows-x64
          path: build/theta.exe
          if-no-files-found: error

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows executable
        uses: actions/download-artifact@v4
        with:
          name: theta-windows-x64
          path: release

      - name: Create release version
        id: version
        shell: pwsh
        run: |
          $tag = "v$(Get-Date -Format 'yyyy.MM.dd').${{ github.run_number }}"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Theta ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release/theta.exe
          fail_on_unmatched_files: true
